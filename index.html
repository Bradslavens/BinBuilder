<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Inventory items in storage bins">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BinBuilder</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/app.css">
  <script type="importmap">
  {
    "imports": {
      "idb": "./vendor/idb/index.js"
    }
  }
  </script>
  <script src="vendor/jsqr/jsQR.js"></script>
  <script src="vendor/jszip/jszip.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="update-banner" class="update-banner hidden" role="status">
      <span>A new version is ready</span>
      <button type="button" id="update-banner-btn">Refresh</button>
    </div>
    <header id="header" class="header hidden">
      <button type="button" id="btn-back" class="btn-icon" aria-label="Back">←</button>
      <h1 id="header-title" class="header-title"></h1>
    </header>
    <main id="main" class="main"></main>
    <nav id="nav" class="bottom-nav hidden">
      <button type="button" class="nav-btn" data-route="home">Home</button>
      <button type="button" class="nav-btn" data-route="bins">Bins</button>
      <button type="button" class="nav-btn" data-route="search">Search</button>
      <button type="button" class="nav-btn" data-route="settings">More</button>
    </nav>
    <div id="toast" class="toast hidden" role="status"></div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
